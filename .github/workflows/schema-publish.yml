name: Publish JSON Schema

on:
  push:
    branches:
      - main
    paths:
      - "src/schema/**"
      - "src/cli.ts"
      - "package.json"

permissions:
  contents: write

jobs:
  publish-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Update fixtures and commit to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Update root.flc.json schema references
          node --input-type=module -e "
            import fs from 'node:fs';
            import { SCHEMA_VERSION, DEFAULT_SCHEMA_URI } from './dist/schema/envelope.js';
            const file = './fixtures/recommended/root.flc.json';
            const doc = JSON.parse(fs.readFileSync(file, 'utf8'));
            doc.\$schema = DEFAULT_SCHEMA_URI;
            doc.schemaVersion = SCHEMA_VERSION;
            fs.writeFileSync(file, JSON.stringify(doc, null, 2) + '\n');
          "
          
          git add fixtures/recommended/root.flc.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update recommended fixture schema reference"
            git push origin main
          fi

      - name: Generate Schema
        run: |
          SCHEMA_VERSION=$(node --input-type=module -e "import { SCHEMA_VERSION } from './dist/schema/envelope.js'; console.log(SCHEMA_VERSION)")
          echo "SCHEMA_VERSION=$SCHEMA_VERSION" >> $GITHUB_ENV
          node dist/cli.js schema > "/tmp/envelope-${SCHEMA_VERSION}.json"

      - name: Deploy to raw-schema-json branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch and checkout (or create) the target branch
          git fetch origin raw-schema-json || true
          if git show-ref --quiet refs/remotes/origin/raw-schema-json; then
            git checkout raw-schema-json
          else
            git checkout --orphan raw-schema-json
            git rm -rf .
          fi

          # Move the generated schema back
          mv "/tmp/envelope-${{ env.SCHEMA_VERSION }}.json" "envelope-${{ env.SCHEMA_VERSION }}.json"

          # Add and commit
          git add "envelope-${{ env.SCHEMA_VERSION }}.json"

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to the schema. Skipping push."
          else
            git commit -m "chore: update raw JSON schema v${{ env.SCHEMA_VERSION }}"
            git push origin raw-schema-json
          fi
